name: LinkedIn Student Jobs Scraper

on:
    # Run at 09:00 and 17:00
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        TELEGRAM_BOT_TOKEN_STUDENT_JOBS: ${{ secrets.TELEGRAM_BOT_TOKEN_STUDENT_JOBS }}
        TELEGRAM_CHAT_ID_STUDENT_JOBS: ${{ secrets.TELEGRAM_CHAT_ID_STUDENT_JOBS }}
        MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
        MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      run: python main.py